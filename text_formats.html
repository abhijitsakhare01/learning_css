<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .text_transform_upper {
            text-transform: uppercase;
        }

        .t_transform_lower {
            text-transform: lowercase;
        }

        .t_transform_capitalize {
            text-transform: capitalize;
        }

        .t_center {
            text-align: center;
        }

        .t_right {
            text-align: right;
        }

        .t_decoration_underline {
            text-decoration: underline;
        }

        .t_decoration_overline {
            text-decoration: overline;
        }

        .t_decoration_through {
            text-decoration: line-through;
        }

        .t_indent {
            text-indent: 180px;
            background-color: blueviolet;
            font-size: 50px;
        }
    </style>
</head>

<body>
    <!-- Text Format -->
    <!-- t_ This is maining for text  -->
    <h1 class="t_decoration_underline ">Abhi Boss</h1>
    <h1 class="t_decoration_overline ">Abhi Boss</h1>
    <h1 class="t_decoration_through">Abhi Boss</h1>
    <h1 class="t_right">Abhi Boss</h1>
    <h1 class="t_center">Abhi Boss</h1>
    <h1 class="text_transform_upper t_center">Avi Mane</h1>
    <h1 class="t_transform_lower">Avi Mane</h1>
    <h1 class="t_transform_capitalize">Abhi Welcome to pune</h1>
    <p class="t_indent">Lorem ipsum dolor sit amet consectetur adipisicing elit. Nostrum soluta ipsam eius rem eos sed
        modi labore nobis officiis. Id fugit quibusdam qui reprehenderit ipsam voluptas autem nostrum aut nulla.</p>
</body>

</html>

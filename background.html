<html lang="en">
<head>

    <title>Document</title>
     <style>
        .background_linear{
            height: 400px;
            font-size: 100px;
            color: blue;
            /* background: linear-gradient( red, green, yellow,black);
            background: linear-gradient(to right, red, green, yellow,black); */
            /* background: linear-gradient(to left, red, green, yellow,black); */

            /* background: conic-gradient(red, green, white,blue); */
            background: conic-gradient( from 90deg, red, green, white,blue);
        }
        div{
            margin-bottom: 50px;
        }

<body>
     <!-- Background  Propeties in 3. Types Linear,Radial Conic -->
